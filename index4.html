<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body {
            width: 35em;
            margin: 0 auto;
            font-family: "Times New Roman", Georgia, serif;
            background-color: #ffffff;
            color: #000000;
        }
        h1 {
            margin-top: 40px;
            font-size: 26px;
        }
        p {
            line-height: 1.5;
            font-size: 16px;
        }
        hr {
            border: none;
            border-top: 1px solid #000;
        }
        .footer {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>404 Not Found</h1>
    <p>
        The requested URL was not found on this server.
    </p>
    <hr>
    <p class="footer">
        nginx
    </p>
</body>
</html>
